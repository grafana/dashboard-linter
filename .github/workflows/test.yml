on:
  pull_request:
  push:
    branches: [main]
name: Test
permissions:
  contents: read

jobs:
  test:
    runs-on: x64
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - name: Test
      run: go test ./...
