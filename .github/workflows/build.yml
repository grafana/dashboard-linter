on:
  pull_request:
  push:
    branches: [main]
name: Build
permissions:
  contents: read

jobs:
  build:
    runs-on: x64
    steps:
    - name: Checkout code
      uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2.7.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - name: Build
      run: go build ./
